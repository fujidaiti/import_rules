name: import_rules
description: >
  A lint plugin for the Dart analyzer that enforces custom import rules via YAML configuration, 
  enabling everything from simple disallow lists to complex module dependency constraints.
version: 0.0.1
repository: https://github.com/fujidaiti/import_rules.git

environment:
  sdk: ^3.10.0

dependencies:
  # We need to pin this version because v0.3.4+ requires analyzer 9.0.0+
  analysis_server_plugin: 0.3.3
  analyzer: ^8.0.0
  glob: ^2.1.3
  path: ^1.9.1
  yaml: ^3.1.3
  logging: ^1.3.0
  meta: ^1.17.0

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.6
